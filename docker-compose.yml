services:
  ig-qt:
    build: .
    image: ig-qt:latest
    container_name: ig-qt
    restart: unless-stopped
    env_file: .env
    environment:
      IG_QT_DATA_DIR: /app/data
      TZ: Asia/Jakarta
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    ports:
      - "127.0.0.1:8080:8080"   # localhost-only health endpoint
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
